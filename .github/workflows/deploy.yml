name: deploy

# Build the Vite SPA and publish dist/ to the `gh-pages` branch so
# https://powder-nomad.github.io/SkiWatch/ updates automatically on
# every push to main.
#
# Required repo secrets:
#   VITE_WEATHER_API_KEY  — Ridgecast prod api-key (provisioned with
#                           https://powder-nomad.github.io in its
#                           origin_allowlist). Set under Settings →
#                           Secrets and variables → Actions.
#
# Manual run: Actions tab → "deploy" → Run workflow.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: gh-pages-deploy
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        # `npm ci` refuses to resolve anything outside the lockfile,
        # blocking accidental version drift from supply-chain attacks
        # that bump transitives mid-deploy.
        run: npm ci

      - name: Audit (fail on high+)
        # Block the deploy if `npm audit` finds anything ≥ high.
        # Moderate-and-below ship; high+ blocks. Adjust if it ever
        # becomes too noisy in practice.
        run: npm audit --audit-level=high

      - name: Type-check
        run: npx tsc -b

      - name: Guard — VITE_WEATHER_API_KEY must be set
        # Fail fast rather than shipping a bundle with no api key
        # (the deployed site would 401 on every weather request).
        # Set the secret under Settings → Secrets and variables → Actions.
        env:
          KEY: ${{ secrets.VITE_WEATHER_API_KEY }}
        run: |
          if [ -z "$KEY" ]; then
            echo "::error::VITE_WEATHER_API_KEY secret is not set."
            echo "Add it under Settings → Secrets and variables → Actions."
            exit 1
          fi

      - name: Build
        env:
          VITE_WEATHER_API_KEY: ${{ secrets.VITE_WEATHER_API_KEY }}
        run: npm run build

      - name: Bundle size budget (initial chunk)
        # Guards against the route-level code-split regressing — if the
        # main `index-*.js` chunk balloons past the budget, fail the
        # deploy. Lazy route/lib chunks (video, dnd, per-page) aren't
        # checked since they only load on demand.
        #
        # Current size at v0.4.x: ~80 KB gz. Budget set to 120 KiB which
        # leaves ~50% headroom for honest growth.
        run: |
          set -e
          INDEX_JS=$(ls dist/assets/index-*.js | head -1)
          if [ -z "$INDEX_JS" ]; then
            echo "::error::No dist/assets/index-*.js found"
            exit 1
          fi
          # gzip -9 mirrors what Vite reports in its build output.
          GZ_SIZE=$(gzip -9c "$INDEX_JS" | wc -c)
          GZ_LIMIT=122880  # 120 KiB
          echo "index gzip size: $GZ_SIZE bytes  (budget: $GZ_LIMIT bytes / 120 KiB)"
          if [ "$GZ_SIZE" -gt "$GZ_LIMIT" ]; then
            echo "::error::index-*.js gzipped is $GZ_SIZE bytes; budget is $GZ_LIMIT."
            echo "Run \`npm run build\` locally and inspect dist/assets/*.js."
            echo "Consider lazy-loading more code or splitting heavy deps."
            ls -la dist/assets/*.js
            exit 1
          fi

      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          publish_branch: gh-pages
          user_name: "github-actions[bot]"
          user_email: "41898282+github-actions[bot]@users.noreply.github.com"
          commit_message: "deploy: ${{ github.event.head_commit.message }}"
